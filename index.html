<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Aliza 🤍</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #008080;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #startBtn {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #ff4a7d;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-weight: bold;
            z-index: 9999;
            transition: transform 0.2s;
        }
        #startBtn:active { transform: scale(0.95); }
        .window {
            position: absolute;
            width: 290px;
            background-color: #cbd0d4;
            border: 2px solid #fff;
            border-right-color: #848484;
            border-bottom-color: #848484;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            display: none;
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px 6px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            width: 16px;
            height: 14px;
            background-color: #cbd0d4;
            border: 1px solid #fff;
            border-right-color: #848484;
            border-bottom-color: #848484;
            color: black;
            font-size: 9px;
            font-weight: bold;
            text-align: center;
            line-height: 12px;
            cursor: pointer;
        }
        .window-body {
            padding: 12px;
            font-size: 13px;
            color: black;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .error-icon {
            width: 28px;
            height: 28px;
            background-color: #ff0000;
            color: white;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <button id="startBtn">jochmuyhvbbe<3</button>

    <!-- កន្លែងដាក់ File ភ្លេង (បើប្រើ .mp3 គ្រាន់តែដូរ src="music.mp3" រួចដូរពាក្យ video ទៅជា audio ណា៎) -->
    <audio id="bgMusic" src="new.mp4" style="display:none;"></audio>

    <script>
        // បញ្ជីលីរិកចម្រៀងពេញមួយបទ គិតជាវិនាទី (Full Song Timeline)
        const lyrics = [
            // វគ្គទី ១ (Verse 1)
            { time: 0.5, text: "You want me knocking? 🚪" },
            { time: 2.5, text: "Why you wanna fight with me? 🥊" },
            { time: 5.5, text: "I'm in your corner... 🛡️" },
            { time: 8.0, text: "Why you wanna fight with me? 🥺" },
            { time: 11.0, text: "Tell me what you're mad about, 😡" },
            { time: 13.5, text: "We can try and work it out. 🤝" },
            { time: 16.0, text: "Baby, why you wanna fight with me? 🤍" },

            // វគ្គបន្ទរទី ១ (Chorus 1)
            { time: 19.5, text: "I don't want no issues, 🛑" },
            { time: 22.0, text: "I just wanna kiss you... 💋" },
            { time: 24.5, text: "Why you wanna fight with me? 🥰" },
            { time: 27.5, text: "You know I adore you, ✨" },
            { time: 30.0, text: "I would do it all for you! 🌹" },
            { time: 33.0, text: "So why you wanna fight with me? 🤷‍♂️" },

            // វគ្គទី ២ (Verse 2)
            { time: 36.5, text: "Look into my eyes now, 👀" },
            { time: 39.0, text: "Put your weapons down. 🏹" },
            { time: 41.5, text: "We don't need no drama, 🎭" },
            { time: 44.0, text: "When you are around. 🌎" },
            { time: 47.0, text: "You're my number one, 🥇" },
            { time: 49.5, text: "Underneath the sun. ☀️" },
            { time: 52.0, text: "So baby, don't be mad at me! 🥺" },

            // វគ្គបន្ទរទី ២ (Chorus 2)
            { time: 55.5, text: "I don't want no issues, 🛑" },
            { time: 58.0, text: "I just wanna kiss you... 💋" },
            { time: 60.5, text: "Why you wanna fight with me? 🥰" },
            { time: 63.5, text: "You know I adore you, ✨" },
            { time: 66.0, text: "I would do it all for you! 🌹" },
            { time: 69.0, text: "So why you wanna fight with me? 🤍" },

            // វគ្គបញ្ចប់ (Outro)
            { time: 73.0, text: "No more fighting, baby... 🕊️" },
            { time: 76.5, text: "I love you so much, Aliza. ❤️" },
            { time: 80.0, text: "Can we smile again? 😊" },
            { time: 84.0, text: "Forever & Always 👩‍❤️‍👨" }
        ];

        const startBtn = document.getElementById('startBtn');
        const bgMusic = document.getElementById('bgMusic');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            bgMusic.play().catch(err => {
                alert("រកមិនឃើញ File ភ្លេងទេ! សូមប្រាកដថាអូនបានដាក់ឈ្មោះ music.mp4 ឬ music.mp3 ត្រឹមត្រូវ។");
            });
            startTimeline();
        });

        function createErrorWindow(text) {
            const win = document.createElement('div');
            win.className = 'window';
            
            // ធ្វើឱ្យផ្ទាំង Error លោតរាយប៉ាយពេញអេក្រង់ទូរសព្ទ
            const top = Math.random() * (window.innerHeight - 140);
            const left = Math.random() * (window.innerWidth - 280);
            win.style.top = top + 'px';
            win.style.left = left + 'px';

            win.innerHTML = `
                <div class="title-bar">
                    <span>Error_Message.exe</span>
                    <div class="close-btn">X</div>
                </div>
                <div class="window-body">
                    <div class="error-icon">×</div>
                    <div><strong>${text}</strong></div>
                </div>
            `;

            document.body.appendChild(win);
            win.style.display = 'block';

            win.querySelector('.close-btn').addEventListener('click', () => {
                win.remove();
            });
        }

        function startTimeline() {
            lyrics.forEach(item => {
                setTimeout(() => {
                    createErrorWindow(item.text);
                }, item.time * 1000);
            });
        }
    </script>
</body>
</html>
