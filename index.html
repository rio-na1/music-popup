<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Aliza 🤍</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #008080;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #startBtn {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #ff4a7d;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-weight: bold;
            z-index: 9999;
            transition: transform 0.2s;
        }
        #startBtn:active { transform: scale(0.95); }
        .window {
            position: absolute;
            width: 290px;
            background-color: #cbd0d4;
            border: 2px solid #fff;
            border-right-color: #848484;
            border-bottom-color: #848484;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            display: none;
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px 6px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            width: 16px;
            height: 14px;
            background-color: #cbd0d4;
            border: 1px solid #fff;
            border-right-color: #848484;
            border-bottom-color: #848484;
            color: black;
            font-size: 9px;
            font-weight: bold;
            text-align: center;
            line-height: 12px;
            cursor: pointer;
        }
        .window-body {
            padding: 12px;
            font-size: 13px;
            color: black;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .error-icon {
            width: 28px;
            height: 28px;
            background-color: #ff0000;
            color: white;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

    <button id="startBtn">jochmuyhvbbe<3</button>

        const startBtn = document.getElementById('startBtn');
        const bgMusic = document.getElementById('bgMusic');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            bgMusic.play().catch(err => {
                alert("រកមិនឃើញ File ភ្លេងទេ! សូមប្រាកដថាអូនបានដាក់ឈ្មោះ music.mp4 ឬ music.mp3 ត្រឹមត្រូវ។");
            });
            startTimeline();
        });

        function createErrorWindow(text) {
            const win = document.createElement('div');
            win.className = 'window';
            
            // ធ្វើឱ្យផ្ទាំង Error លោតរាយប៉ាយពេញអេក្រង់ទូរសព្ទ
            const top = Math.random() * (window.innerHeight - 140);
            const left = Math.random() * (window.innerWidth - 280);
            win.style.top = top + 'px';
            win.style.left = left + 'px';

            win.innerHTML = `
                <div class="title-bar">
                    <span>Error_Message.exe</span>
                    <div class="close-btn">X</div>
                </div>
                <div class="window-body">
                    <div class="error-icon">×</div>
                    <div><strong>${text}</strong></div>
                </div>
            `;

            document.body.appendChild(win);
            win.style.display = 'block';

            win.querySelector('.close-btn').addEventListener('click', () => {
                win.remove();
            });
        }

        function startTimeline() {
            lyrics.forEach(item => {
                setTimeout(() => {
                    createErrorWindow(item.text);
                }, item.time * 1000);
            });
        }
    </script>

</html>
